services:
  db:
    image: postgres:17-alpine
    container_name: escolaonline-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: escolaonline
    ports:
      - "5432:5432"
    volumes:
      - escolaonline-db:/var/lib/postgresql/data

volumes:
  escolaonline-db: